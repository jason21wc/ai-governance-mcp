repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.0
    hooks:
      - id: ruff-format
        name: ruff format
        args: [src/, tests/]
      - id: ruff
        name: ruff check
        args: [--fix, src/, tests/]
  - repo: local
    hooks:
      - id: regen-test-failure-mode-map
        name: regen test-failure-mode map
        # Triggers when the registry OR any test file OR the generator itself
        # changes. Regenerates the derived map; fails if committed file differs
        # (author must re-stage). Closes BACKLOG #123 — plan v3 called the map
        # "rot-immune" but regeneration was manual; this gate makes the claim true.
        entry: bash -c 'python3 scripts/generate-test-failure-map.py && git diff --exit-code documents/test-failure-mode-map.md'
        language: system
        files: '^(documents/failure-mode-registry\.md|tests/.*\.py|scripts/generate-test-failure-map\.py)$'
        pass_filenames: false
      - id: citation-form-check
        name: citation form check (§9.8.9)
        # Rejects bare `<file>.md:<line-number>` citations per §9.8.9 Citation
        # Discipline. Closes BACKLOG #144 — structural prevention of the
        # line-citation drift class that hit BACKLOG #100 arc twice.
        entry: python3 scripts/check-citations.py
        language: system
        pass_filenames: false
